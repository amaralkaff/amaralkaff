name: Update Star List
on:
  workflow_dispatch:
  schedule:
    - cron: "30 0 * * *"

jobs:
  update-stars:
    name: "⭐ Update Stars"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: "⭐ Update Star Count"
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GH_TOKEN }}
          script: |
            const fs = require('fs');
            let total = 0;
            let page = 1;
            while (true) {
              const res = await github.rest.activity.listReposStarredByAuthenticatedUser({
                per_page: 100,
                page: page
              });
              if (res.data.length === 0) break;
              total += res.data.length;
              page++;
            }
            let readme = fs.readFileSync('README.md', 'utf8');
            const startTag = '<!--START_SECTION:stars-->';
            const endTag = '<!--END_SECTION:stars-->';
            const startIdx = readme.indexOf(startTag);
            const endIdx = readme.indexOf(endTag);
            if (startIdx !== -1 && endIdx !== -1) {
              readme = readme.substring(0, startIdx + startTag.length) + 'Total Stars: ' + total + readme.substring(endIdx);
              fs.writeFileSync('README.md', readme);
            }

      - name: "📝 Commit Changes"
        run: |
          git config user.name "amaralkaff"
          git config user.email "tpamangly@gmail.com"
          git diff --quiet README.md || (git add README.md && git commit -m "⭐ Updated star count" && git push)
