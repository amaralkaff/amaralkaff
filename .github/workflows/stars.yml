name: Update Star List
on:
  workflow_dispatch:
  schedule:
    - cron: "30 0 * * *"

jobs:
  update-stars:
    name: "⭐ Update Stars"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: "⭐ Update Star Count"
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GH_TOKEN }}
          script: |
            const fs = require('fs');
            let total = 0;
            let page = 1;
            while (true) {
              const res = await github.rest.repos.listForAuthenticatedUser({
                per_page: 100,
                page: page,
                affiliation: 'owner'
              });
              if (res.data.length === 0) break;
              for (const repo of res.data) {
                total += repo.stargazers_count;
              }
              page++;
            }
            let readme = fs.readFileSync('README.md', 'utf8');
            // Remove existing Total Stars line if present
            readme = readme.replace(/\nTotal Stars: \d+\n```/, '\n```');
            // Insert Total Stars before the closing ``` of the waka block
            const wakaEnd = readme.indexOf('\n```\n\n<!--END_SECTION:waka-->');
            if (wakaEnd === -1) {
              // Try alternate pattern
              const alt = readme.indexOf('\n```\n<!--END_SECTION:waka-->');
              if (alt !== -1) {
                readme = readme.substring(0, alt) + '\nTotal Stars: ' + total + readme.substring(alt);
              }
            } else {
              readme = readme.substring(0, wakaEnd) + '\nTotal Stars: ' + total + readme.substring(wakaEnd);
            }
            fs.writeFileSync('README.md', readme);

      - name: "📝 Commit Changes"
        run: |
          git config user.name "amaralkaff"
          git config user.email "tpamangly@gmail.com"
          git diff --quiet README.md || (git add README.md && git commit -m "⭐ Updated star count" && git push)
