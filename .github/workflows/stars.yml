name: Update Star List
on:
  workflow_dispatch:
  schedule:
    - cron: "30 0 * * *"

jobs:
  update-stars:
    name: Update Stars
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Update Star Count
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GH_TOKEN }}
          script: |
            const fs = require('fs');
            let total = 0;
            let page = 1;
            while (true) {
              const res = await github.rest.repos.listForAuthenticatedUser({
                per_page: 100,
                page: page,
                affiliation: 'owner'
              });
              if (res.data.length === 0) break;
              for (const repo of res.data) {
                total += repo.stargazers_count;
              }
              page++;
            }
            let readme = fs.readFileSync('README.md', 'utf8');
            // Remove existing Total Stars line if present
            readme = readme.replace(/\nTotal Stars: \d+\n```/, '\n```');
            // Insert Total Stars with gap before closing ```
            const lines = readme.split('\n');
            for (let i = 0; i < lines.length; i++) {
              if (lines[i].trim() === '```' && i > 3) {
                lines.splice(i, 0, '', 'Total Stars: ' + total);
                break;
              }
            }
            fs.writeFileSync('README.md', lines.join('\n'));

      - name: Commit Changes
        run: |
          git config user.name "amaralkaff"
          git config user.email "tpamangly@gmail.com"
          git diff --quiet README.md || (git add README.md && git commit -m "Updated star count" && git push)
